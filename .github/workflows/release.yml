name: Build and Release

on:
  push:
    # branches: [ main ]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  # pull_request:
  #   branches: [ main ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true' # Полностью скрывает предупреждения об устаревании Node.js 20
  HOMEBREW_NO_AUTO_UPDATE: '1'                    # Скрывает предупреждения brew и ускоряет запуск шага macOS
  HOMEBREW_NO_INSTALL_CLEANUP: '1'

permissions:
  contents: write

jobs:
  # ==========================================
  # 1. СБОРКА И УПАКОВКА ПОД LINUX (PORTABLE ZIP)
  # ==========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake qt6-base-dev libgl1-mesa-dev zip

      - name: Configure and Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package Portable ZIP
        run: |
          mkdir PDP11-Linux
          cp build/PDP11 PDP11-Linux/
          cp Docs/PDP11.pdf Docs/"PDP11 RU.pdf" PDP11-Linux/
          zip -r PDP11-Linux.zip PDP11-Linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDP11-Linux
          path: PDP11-Linux.zip

  # ==========================================
  # 2. СБОРКА НА ТИВНОГО ПАКЕТА ДЛЯ ARCH LINUX
  # ==========================================
  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm base-devel cmake qt6-base imagemagick git sudo

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch and Run setup_package.sh
        run: |
          # Создаем изолированного пользователя builder для makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .

          # Отключаем установку пакета (-i) и копируем ТОЛЬКО основной пакет (без debug) в корень перед очисткой
          sed -i 's/makepkg -si/makepkg -s/g' setup_package.sh
          sed -i 's/cd .. \&\& rm -rf pdp11_pkg/cp pdp11-[0-9]*.pkg.tar.zst ..\/PDP11.pkg.tar.zst \&\& cd .. \&\& rm -rf pdp11_pkg/g' setup_package.sh

          # Запуск сборки от пользователя builder
          su builder -c "bash setup_package.sh"

      - name: Upload Arch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDP11-ArchLinux
          path: PDP11.pkg.tar.zst

  # ==========================================
  # 3. СТАТИЧЕСКАЯ СБОРКА ПОД WINDOWS (PORTABLE ZIP)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 and Static Qt6
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-qt6-static
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pcre2
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-brotli
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-double-conversion
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-vulkan-headers

      - name: Configure and Build
        run: |
          cmake -S . -B build-windows -G "MinGW Makefiles"
          cmake --build build-windows -j2

      - name: Package Windows ZIP (PowerShell)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path .\PDP11-Windows
          Copy-Item -Path .\build-windows\PDP11.exe -Destination .\PDP11-Windows\
          Copy-Item -Path .\Docs\PDP11.pdf -Destination .\PDP11-Windows\
          Copy-Item -Path ".\Docs\PDP11 RU.pdf" -Destination .\PDP11-Windows\
          Compress-Archive -Path .\PDP11-Windows -DestinationPath .\PDP11-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDP11-Windows
          path: PDP11-Windows.zip

  # ==========================================
  # 4. СБОРКА ПОД MACOS (PORTABLE & INSTALLER)
  # ==========================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'

      - name: Create Localized Resources
        run: |
          mkdir -p assets/locales/ru.lproj
          mkdir -p assets/locales/en.lproj
          echo 'CFBundleDisplayName = "Эмулятор системы команд PDP-11";' > assets/locales/ru.lproj/InfoPlist.strings
          echo 'CFBundleName = "Эмулятор системы команд PDP-11";' >> assets/locales/ru.lproj/InfoPlist.strings
          echo 'CFBundleDisplayName = "Command System Emulator PDP-11";' > assets/locales/en.lproj/InfoPlist.strings
          echo 'CFBundleName = "Command System Emulator PDP-11";' >> assets/locales/en.lproj/InfoPlist.strings

          # Создаем кастомный Info.plist.in с поддержкой локализации имени в Finder/Launchpad
          cat > assets/Info.plist.in <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>\${MACOSX_BUNDLE_EXECUTABLE_NAME}</string>
              <key>CFBundleIconFile</key>
              <string>\${MACOSX_BUNDLE_ICON_FILE}</string>
              <key>CFBundleIdentifier</key>
              <string>\${MACOSX_BUNDLE_GUI_IDENTIFIER}</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>\${MACOSX_BUNDLE_BUNDLE_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>\${MACOSX_BUNDLE_BUNDLE_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>\${MACOSX_BUNDLE_SHORT_VERSION_STRING}</string>
              <key>CFBundleVersion</key>
              <string>\${MACOSX_BUNDLE_BUNDLE_VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>\${MACOSX_BUNDLE_MINIMUM_SYSTEM_VERSION}</string>
              <key>NSHumanReadableCopyright</key>
              <string>\${MACOSX_BUNDLE_COPYRIGHT}</string>
              <key>LSHasLocalizedDisplayName</key>
              <true/>
              <key>CFBundleLocalizations</key>
              <array>
                  <string>ru</string>
                  <string>en</string>
              </array>
          </dict>
          </plist>
          EOF

      - name: Generate macOS ICNS Icon
        run: |
          mkdir pdp11.iconset
          sips -z 16 16     assets/icon.png --out pdp11.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out pdp11.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out pdp11.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out pdp11.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out pdp11.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out pdp11.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out pdp11.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out pdp11.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out pdp11.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out pdp11.iconset/icon_512x512@2x.png
          iconutil -c icns pdp11.iconset -o assets/icon.icns

      - name: Configure and Build (Universal Binary)
        run: |
          # Собираем универсальный бинарник (x86_64 + arm64) с поддержкой систем от macOS 11.0
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0"
          cmake --build build -j2

      - name: Deploy dependencies into App Bundle
        run: |
          macdeployqt "build/Command System Emulator PDP-11.app"

      - name: Create Drag-and-Drop Installer DMG
        run: |
          brew install create-dmg
          mkdir dmg_root
          cp -R "build/Command System Emulator PDP-11.app" dmg_root/
          cp Docs/PDP11.pdf dmg_root/
          cp Docs/"PDP11 RU.pdf" dmg_root/

          create-dmg \
            --volname "PDP11 Installer" \
            --window-pos 200 120 \
            --window-size 600 450 \
            --icon-size 100 \
            --icon "Command System Emulator PDP-11.app" 150 150 \
            --icon "PDP11.pdf" 150 320 \
            --icon "PDP11 RU.pdf" 450 320 \
            --hide-extension "Command System Emulator PDP-11.app" \
            --app-drop-link 450 150 \
            PDP11.dmg \
            dmg_root/

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDP11-macOS
          path: PDP11.dmg

  # ==========================================
  # 5. АВТОМАТИЧЕСКАЯ ПУБЛИКАЦИЯ РЕЛИЗА
  # ==========================================
  publish-release:
    needs: [build-linux, build-arch, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # Срабатывает на любой числовой тег
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: PDP11-Linux

      - name: Download Arch Artifact
        uses: actions/download-artifact@v4
        with:
          name: PDP11-ArchLinux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: PDP11-Windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: PDP11-macOS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PDP11-Linux.zip
            PDP11.pkg.tar.zst
            PDP11-Windows.zip
            PDP11.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
